name: Prerelease

on:
  pull_request:
    types: [closed]

jobs:
  prerelease:
    name: Prerelease
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-v') }}
    env:
      GH_TOKEN: ${{ github.token }}
      REF_BRANCH: ${{ github.event.pull_request.head.ref }}
    permissions:
      contents: write # This is required for checkout and gh release
      id-token: write # This is required for requesting the JWT
      pull-requests: read
      packages: read # This is required for npm.pkg.github.com
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Check licenses
        run: pnpm license-check

      - name: GraphQL Codegen
        run: pnpm graphql-codegen

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Compile project
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: pnpm build

      - name: Inject & upload source maps to Grafana Faro
        run: |
          PACKAGE_VERSION=$(jq -r .version server/package.json)
          scripts/sourcemaps/uploadSourcemaps.sh banking $PACKAGE_VERSION ${{ secrets.FARO_APP_ID_BANKING }}
          scripts/sourcemaps/uploadSourcemaps.sh onboarding $PACKAGE_VERSION ${{ secrets.FARO_APP_ID_ONBOARDING }}
          scripts/sourcemaps/uploadSourcemaps.sh payment $PACKAGE_VERSION ${{ secrets.FARO_APP_ID_PAYMENT }}
        env:
          FARO_SOURCEMAP_ENDPOINT: https://faro-api-prod-eu-west-6.grafana.net/faro/api/v1
          FARO_API_KEY: ${{ secrets.FARO_API_KEY }}
          FARO_STACK_ID: ${{ secrets.FARO_STACK_ID }}

      - name: Configure AWS Credentials
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-west-1

      - name: Login to Docker Registry
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}

      - name: Get version
        id: version
        run: echo version="$REF_BRANCH" | sed -e 's/release-//g' >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Dockerize & Push to Registry
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: Dockerfile-swan
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/swan-partner-frontend:preprod-${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/swan-partner-frontend:preprod-${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_REGISTRY }}/swan-partner-frontend:prod-${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/swan-partner-frontend:prod-${{ steps.version.outputs.version }}

      - name: Deploy
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        run: pnpm deploy-ci
        env:
          TAG: preprod-${{ steps.version.outputs.version }}
          DEPLOY_SWAN_APP_ID: ${{ secrets.DEPLOY_SWAN_APP_ID }}
          DEPLOY_SWAN_APP_SECRET: ${{ secrets.DEPLOY_SWAN_APP_SECRET }}
          DEPLOY_ENVIRONMENT: preprod
          DEPLOY_APP_NAME: partner-frontend

      - name: Create GitHub prerelease
        run: pnpm tsx scripts/release/createPrerelease.ts
