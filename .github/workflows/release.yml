name: Release

on:
  release:
    types: [released]

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read # This is required for actions/checkout
      id-token: write # This is required for requesting the JWT
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Deploy prod
        if: ${{ github.repository == 'swan-io/swan-partner-frontend' }}
        run: pnpm deploy-ci
        env:
          TAG: prod-${{ github.ref_name }}
          DEPLOY_SWAN_APP_ID: ${{ secrets.DEPLOY_SWAN_APP_ID }}
          DEPLOY_SWAN_APP_SECRET: ${{ secrets.DEPLOY_SWAN_APP_SECRET }}
          DEPLOY_ENVIRONMENT: prod
          DEPLOY_APP_NAME: partner-frontend
